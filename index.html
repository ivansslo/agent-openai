<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ivansslo/agent-openai</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            margin: 0;
            background-color: #0d1117;
            color: #c9d1d9;
        }
        header {
            background-color: #161b22;
            padding: 16px 32px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
        }
        .repo-header {
            padding: 16px 32px 0;
            background-color: #0d1117;
        }
        .repo-title {
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .repo-title a {
            color: #58a6ff;
            text-decoration: none;
        }
        .repo-title a:hover {
            text-decoration: underline;
        }
        .repo-title .separator {
            color: #8b949e;
        }
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #30363d;
        }
        .tab {
            padding: 8px 16px;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab:hover {
            background-color: #161b22;
            border-bottom-color: #8b949e;
        }
        .tab.active {
            font-weight: 600;
            border-bottom-color: #f78166;
        }
        .tab-icon {
            fill: #8b949e;
        }
        .active .tab-icon {
            fill: #c9d1d9;
        }
        .content {
            padding: 32px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .agent-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .agent-name {
            font-size: 18px;
            font-weight: 600;
            color: #58a6ff;
        }
        .agent-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            background-color: #238636;
            color: white;
        }
        .agent-desc {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 16px;
        }
        .btn {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 5px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
        .btn-primary {
            background-color: #238636;
            color: white;
            border-color: rgba(240,246,252,0.1);
        }
        .btn-primary:hover {
            background-color: #2ea043;
        }
    </style>
</head>

    <div class="content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 style="font-size: 20px; font-weight: 400;">Active Agents</h2>
            <button class="btn btn-primary">Create Agent</button>
        </div>

        <div class="agent-card">
            <div class="agent-header">
                <div class="agent-name">OpenAI-Assistant-01</div>
                <span class="agent-status">Online</span>
            </div>
            <div class="agent-desc">Main assistant for code reviews and repository management. Using GPT-4o model.</div>
            <div style="display: flex; gap: 8px;">
                <button class="btn">Configure</button>
                <button class="btn">Logs</button>
            </div>
        </div>

        <div class="agent-card">
            <div class="agent-header">
                <div class="agent-name">DocGen-Agent</div>
                <span class="agent-status" style="background-color: #8b949e;">Idle</span>
            </div>
            <div class="agent-desc">Generates documentation from codebase comments. Running on schedule.</div>
            <div style="display: flex; gap: 8px;">
                <button class="btn">Configure</button>
                <button class="btn">Logs</button>
            </div>
        </div>
    </div>
